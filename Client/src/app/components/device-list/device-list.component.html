<div class="container">
  <div class="header">
    <h1>Device Management</h1>
    <div>
      <span class="user-name">Hello, {{ currentUserName }}</span>
      <button (click)="createDevice()" class="action-button">+ Add Device</button>
      <button (click)="logout()" class="action-button">Logout</button>
    </div>
  </div>

  <div class="search-bar">
  <input 
    [(ngModel)]="searchQuery" 
    placeholder="Search by name, manufacturer, processor or RAM..."
    (keyup.enter)="searchDevices()"
  />
  <button (click)="searchDevices()" class="action-button">Search</button>
  <button (click)="clearSearch()" class="action-button">Clear</button>
</div>

  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Manufacturer</th>
        <th>Type</th>
        <th>OS</th>
        <th>RAM</th>
        <th>Assigned To</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let device of devices">
        <td>{{ device.name }}</td>
        <td>{{ device.manufacturer }}</td>
        <td>{{ device.type }}</td>
        <td>{{ device.operatingSystem }} {{ device.osVersion }}</td>
        <td>{{ device.ram }} GB</td>
        <td>{{ getUserName(device.assignedUserId) }}</td>
        <td>
          <button (click)="viewDetails(device.id)" class="action-button">View</button>
          <button (click)="editDevice(device.id)" class="action-button">Edit</button>
          <button (click)="deleteDevice(device.id)" class="action-button">Delete</button>
          <button *ngIf="!device.assignedUserId" (click)="assignDevice(device.id)" class="action-button">Assign to me</button>
          <button *ngIf="isAssignedToMe(device)" (click)="unassignDevice(device.id)" class="action-button">Unassign</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
