<div class="container">
  <div class="header">
    <h1>Device Management</h1>
    <button (click)="createDevice()" class="add-button">+ Add Device</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Manufacturer</th>
        <th>Type</th>
        <th>OS</th>
        <th>RAM</th>
        <th>Assigned To</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let device of devices">
        <td>{{ device.name }}</td>
        <td>{{ device.manufacturer }}</td>
        <td>{{ device.type }}</td>
        <td>{{ device.operatingSystem }} {{ device.osVersion }}</td>
        <td>{{ device.ram }} GB</td>
        <td>{{ getUserName(device.assignedUserId) }}</td>
        <td>
          <button (click)="viewDetails(device.id)" class="action-button">View</button>
          <button (click)="editDevice(device.id)" class="action-button">Edit</button>
          <button (click)="deleteDevice(device.id)" class="action-button">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
